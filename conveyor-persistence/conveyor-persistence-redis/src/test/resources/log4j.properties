log4j.rootLogger=ERROR, stdout

log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%d{ISO8601} %-5p [%t] %c - %m%n

log4j.logger.com.aegisql.conveyor.persistence.redis=ERROR
log4j.logger.com.aegisql.conveyor.persistence.redis.RedisPersistence=ERROR
log4j.logger.com.aegisql.conveyor.Conveyor=ERROR
