name: Build

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Maven Clean Test-Compile
        run: mvn -B -q -DskipTests clean test-compile
