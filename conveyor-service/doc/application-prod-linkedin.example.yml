# Example LinkedIn OAuth2 login configuration for conveyor-service.
#
# Suggested usage:
# 1) Use this as reference for src/main/resources/application-linkedin.yml
# 2) Set env vars: LINKEDIN_CLIENT_ID, LINKEDIN_CLIENT_SECRET, JWT_ISSUER_URI
# 3) Run with profiles: prod,linkedin
#
# LinkedIn app redirect URI must include:
#   http://localhost:8080/login/oauth2/code/linkedin

spring:
  config:
    activate:
      on-profile: linkedin
  security:
    oauth2:
      client:
        registration:
          linkedin:
            provider: linkedin
            client-id: ${LINKEDIN_CLIENT_ID:replace-me}
            client-secret: ${LINKEDIN_CLIENT_SECRET:replace-me}
            client-name: LinkedIn
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            # For local runs, keep this exact callback URI aligned with LinkedIn app settings.
            redirect-uri: "http://localhost:8080/login/oauth2/code/linkedin"
            scope:
              - openid
              # Prefer email-only profileless login to avoid requesting profile photo.
              # If your LinkedIn app is provisioned for "profile", you can add it.
              - email
        provider:
          linkedin:
            authorization-uri: https://www.linkedin.com/oauth/v2/authorization
            token-uri: https://www.linkedin.com/oauth/v2/accessToken
            user-info-uri: https://api.linkedin.com/v2/userinfo
            jwk-set-uri: https://www.linkedin.com/oauth/openid/jwks
            user-name-attribute: sub
      resourceserver:
        jwt:
          # Set to your JWT issuer for REST bearer-token auth in prod.
          # If your deployment does not use JWT bearer auth, still provide a valid issuer
          # or keep the default from application.yml as appropriate for your environment.
          issuer-uri: ${JWT_ISSUER_URI:https://www.linkedin.com/oauth}

conveyor:
  service:
    oauth2-login-enable: true
