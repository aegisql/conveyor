# Example Facebook OAuth2 login configuration for conveyor-service.
#
# Suggested usage:
# 1) Use this as reference for src/main/resources/application-facebook.yml
# 2) Set env vars: FACEBOOK_CLIENT_ID, FACEBOOK_CLIENT_SECRET, JWT_ISSUER_URI
# 3) Run with profiles: prod,facebook
#
# Facebook app redirect URI must include:
#   http://localhost:8080/login/oauth2/code/facebook

spring:
  config:
    activate:
      on-profile: facebook
  security:
    oauth2:
      client:
        registration:
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:replace-me}
            client-secret: ${FACEBOOK_CLIENT_SECRET:replace-me}
            client-name: Facebook
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - public_profile
              - email
      resourceserver:
        jwt:
          # Required by prod security chain (JWT resource server is enabled).
          # Point this to your corporate or platform JWT issuer.
          issuer-uri: ${JWT_ISSUER_URI:https://issuer.example.com}

conveyor:
  service:
    oauth2-login-enable: true
