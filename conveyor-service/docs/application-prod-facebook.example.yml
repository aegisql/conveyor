# Example Facebook OAuth2 login configuration for conveyor-service.
#
# Suggested usage:
# 1) Use this as reference for src/main/resources/application-facebook.yml
# 2) Set env vars: FACEBOOK_CLIENT_ID, FACEBOOK_CLIENT_SECRET
# 3) Run with profiles: prod,facebook
#
# Facebook app redirect URI must include:
#   http://localhost:8080/login/oauth2/code/facebook

spring:
  config:
    activate:
      on-profile: facebook
  security:
    oauth2:
      client:
        registration:
          facebook:
            provider: facebook
            client-id: ${FACEBOOK_CLIENT_ID:replace-me}
            client-secret: ${FACEBOOK_CLIENT_SECRET:replace-me}
            client-name: Facebook
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            # For local runs, keep this exact callback URI aligned with Facebook app settings.
            redirect-uri: "http://localhost:8080/login/oauth2/code/facebook"
            scope:
              - email
              - public_profile
conveyor:
  service:
    oauth2-login-enable: true
    # Disable JWT resource-server mode when only browser OAuth login is used.
    oauth2-resource-server-enable: false
